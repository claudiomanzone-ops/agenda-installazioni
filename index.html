<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Installazioni</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCygUawe-ofhq2BtB-l0SvQnM3jlGmqCyo&libraries=places&callback=initMaps" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #d6d3cf; font-family: 'IBM Plex Mono', 'Courier New', monospace; }
input, select { font-family: inherit; }
.pac-container { background: #1a1a1a; border: 1px solid #444; font-family: 'IBM Plex Mono', monospace; }
.pac-item { color: #aaa; border-top: 1px solid #222; padding: 6px 8px; cursor: pointer; font-size: 12px; }
.pac-item:hover { background: #222; }
.pac-item-query { color: #f59e0b; }
.pac-matched { color: #f59e0b; }
</style>
</head>
<body>
<div id="root"></div>
<script>
window._mapsReady = false;
window.initMaps = function() { window._mapsReady = true; window._mapsReadyResolve && window._mapsReadyResolve(); };
window._mapsReadyPromise = new Promise(r => { window._mapsReadyResolve = r; if(window._mapsReady) r(); });
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const DEFAULT_SETTINGS = { costoKm: 0.35, velocitaMedia: 60, cittaBase: "Genova, Italia" };
function minToHHMM(min) { if (!min && min !== 0) return "—"; const h = Math.floor(min/60), m = min%60; return h > 0 ? `${h}h${m > 0 ? " "+m+"m" : ""}` : `${m}m`; }
function timeToMin(hhmm) { const [h,m] = hhmm.split(":").map(Number); return h*60+m; }
function minToTime(t) { const h=Math.floor(t/60)%24, m=t%60; return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }
function fmt(n) { return (parseFloat(n)||0).toFixed(2); }
const emptyApp = () => ({ id: Date.now()+Math.random(), cliente:"", indirizzo:"", km:null, kmLoading:false, kmError:null, durataLavoro:90, fattura:"", orarioInizio:"08:00", note:"", extraDisp:[] });
function calcApp(app, s) {
  const km=parseFloat(app.km)||0, fattura=parseFloat(app.fattura)||0;
  const extraTot=(app.extraDisp||[]).reduce((acc,d)=>acc+(parseFloat(d.prezzo)||0),0);
  const tv=km>0?Math.round((km/s.velocitaMedia)*60):0;
  const cv=km*2*s.costoKm, dl=parseInt(app.durataLavoro)||0;
  return {km,fattura,extraTot,ricavoTot:fattura+extraTot,tempoViaggio:tv,costoViaggio:cv,durataLavoro:dl,tempoTotale:tv*2+dl,utile:fattura+extraTot-cv};
}
const iStyle = { width:"100%", background:"#111", border:"1px solid #333", color:"#e5e0d8", padding:"7px 9px", fontSize:"14px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" };
const lbl = { color:"#555", fontSize:"11px", display:"block", marginBottom:"4px", letterSpacing:"0.07em" };
function AddressInput({ value, onChange, onPlaceSelected }) {
  const ref=useRef(null), acRef=useRef(null);
  const [ready,setReady]=useState(window._mapsReady);
  useEffect(()=>{ window._mapsReadyPromise.then(()=>setReady(true)); },[]);
  useEffect(()=>{
    if(!ready||!ref.current||acRef.current) return;
    acRef.current=new window.google.maps.places.Autocomplete(ref.current,{componentRestrictions:{country:"it"},fields:["formatted_address"]});
    acRef.current.addListener("place_changed",()=>{ const p=acRef.current.getPlace(); if(p?.formatted_address){onChange(p.formatted_address);onPlaceSelected(p.formatted_address);} });
  },[ready]);
  return <input ref={ref} value={value} onChange={e=>onChange(e.target.value)} placeholder={ready?"Indirizzo — autocompletamento attivo":"Indirizzo"} style={iStyle} />;
}
function ExtraDispositivi({ extra, onChange }) {
  const add=()=>onChange([...extra,{id:Date.now(),nome:"",prezzo:""}]);
  const rem=id=>onChange(extra.filter(d=>d.id!==id));
  const upd=(id,k,v)=>onChange(extra.map(d=>d.id===id?{...d,[k]:v}:d));
  const tot=extra.reduce((s,d)=>s+(parseFloat(d.prezzo)||0),0);
  return (
    <div style={{marginTop:10,borderTop:"1px solid #1e1e1e",paddingTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{...lbl,margin:0}}>EXTRA SUL POSTO</span>
        <button onClick={add} style={{background:"transparent",border:"1px solid #444",color:"#888",padding:"4px 10px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>+ aggiungi</button>
      </div>
      {extra.length===0&&<div style={{color:"#333",fontSize:11}}>Nessun extra</div>}
      {extra.map(d=>(
        <div key={d.id} style={{display:"grid",gridTemplateColumns:"1fr 90px 30px",gap:4,marginBottom:4}}>
          <input style={iStyle} placeholder="Dispositivo" value={d.nome} onChange={e=>upd(d.id,"nome",e.target.value)}/>
          <input type="number" style={{...iStyle,color:"#4ade80"}} placeholder="€" value={d.prezzo} onChange={e=>upd(d.id,"prezzo",e.target.value)}/>
          <button onClick={()=>rem(d.id)} style={{background:"transparent",border:"1px solid #333",color:"#555",cursor:"pointer",fontSize:16}}>×</button>
        </div>
      ))}
      {extra.length>0&&<div style={{textAlign:"right",color:"#4ade80",fontSize:12,marginTop:4}}>+€{tot.toFixed(2)}</div>}
    </div>
  );
}
function AppCard({ app, idx, settings, onUpdate, onRemove, prevEndMin, fetchKm }) {
  const calc=calcApp(app,settings);
  const startMin=timeToMin(app.orarioInizio), endMin=startMin+calc.tempoTotale;
  const overlap=prevEndMin!==null&&startMin<prevEndMin;
  const [showExtra,setShowExtra]=useState(false);
  return (
    <div style={{border:"1px solid #222",background:"#0d0d0d",marginBottom:12,borderRadius:2}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#141414",borderBottom:"1px solid #1e1e1e"}}>
        <span style={{color:"#f59e0b",fontSize:11,letterSpacing:"0.12em"}}>INTERVENTO {idx+1}</span>
        <button onClick={()=>onRemove(app.id)} style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕ rimuovi</button>
      </div>
      <div style={{padding:12}}>
        <div style={{marginBottom:8}}><label style={lbl}>CLIENTE</label><input style={iStyle} placeholder="Nome cliente" value={app.cliente} onChange={e=>onUpdate(app.id,"cliente",e.target.value)}/></div>
        <div style={{marginBottom:8}}><label style={lbl}>INDIRIZZO</label><AddressInput value={app.indirizzo} onChange={v=>onUpdate(app.id,"indirizzo",v)} onPlaceSelected={addr=>fetchKm(app.id,addr)}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div>
            <label style={lbl}>KM ANDATA</label>
            {app.kmLoading?<div style={{...iStyle,color:"#555",textAlign:"center"}}>…</div>:<input type="number" style={{...iStyle,color:app.km?"#f59e0b":"#e5e0d8"}} placeholder="0" value={app.km??""} onChange={e=>onUpdate(app.id,"km",e.target.value)}/>}
            {app.kmError&&<div style={{color:"#f87171",fontSize:10,marginTop:2}}>errore — inserisci manuale</div>}
          </div>
          <div><label style={lbl}>DURATA</label>
            <select style={iStyle} value={app.durataLavoro} onChange={e=>onUpdate(app.id,"durataLavoro",e.target.value)}>
              {[30,60,90,120,150,180,240,300,360].map(v=><option key={v} value={v}>{minToHHMM(v)}</option>)}
            </select>
          </div>
          <div><label style={lbl}>INIZIO</label><input type="time" style={iStyle} value={app.orarioInizio} onChange={e=>onUpdate(app.id,"orarioInizio",e.target.value)}/></div>
        </div>
        <div style={{marginBottom:8}}><label style={lbl}>FATTURA VERISURE (€)</label><input type="number" style={{...iStyle,color:"#4ade80"}} placeholder="0.00" value={app.fattura} onChange={e=>onUpdate(app.id,"fattura",e.target.value)}/></div>
        <button onClick={()=>setShowExtra(s=>!s)} style={{width:"100%",background:"transparent",border:`1px solid ${showExtra?"#92400e":"#222"}`,color:showExtra?"#f59e0b":"#444",padding:"6px 8px",fontSize:11,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.08em",textAlign:"left"}}>
          {showExtra?"▲ chiudi extra":"▼ dispositivi extra sul posto"}
        </button>
        {showExtra&&<ExtraDispositivi extra={app.extraDisp||[]} onChange={v=>onUpdate(app.id,"extraDisp",v)}/>}
        <div style={{marginTop:8}}><label style={lbl}>NOTE</label><input style={iStyle} placeholder="Note" value={app.note} onChange={e=>onUpdate(app.id,"note",e.target.value)}/></div>
      </div>
      {(app.km||app.fattura)&&(
        <div style={{margin:"0 12px 12px",border:"1px solid #1a1a1a",background:"#050505",padding:10,fontSize:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",rowGap:4,color:"#444"}}>
            <span>Viaggio A/R</span><span style={{color:"#888"}}>{calc.km*2} km · {minToHHMM(calc.tempoViaggio*2)}</span>
            <span>Trasferta</span><span style={{color:"#f59e0b"}}>–€{calc.costoViaggio.toFixed(2)}</span>
            <span>Fattura</span><span style={{color:"#4ade80"}}>€{fmt(app.fattura)}</span>
            {calc.extraTot>0&&<><span>Extra</span><span style={{color:"#4ade80"}}>+€{calc.extraTot.toFixed(2)}</span></>}
            <span>Fine prevista</span><span style={{color:"#888"}}>{minToTime(endMin)}</span>
          </div>
          {app.fattura&&(
            <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#444"}}>Utile lordo</span>
              <span style={{fontWeight:"bold",color:calc.utile>=0?"#4ade80":"#f87171"}}>€{calc.utile.toFixed(2)}</span>
            </div>
          )}
        </div>
      )}
      {overlap&&<div style={{margin:"0 12px 12px",border:"1px solid #7f1d1d",background:"#1a0808",color:"#f87171",fontSize:11,padding:"6px 8px"}}>⚠ SOVRAPPOSIZIONE — precedente finisce {minToTime(prevEndMin)}</div>}
    </div>
  );
}
function DaySummary({ apps, settings }) {
  if(!apps.length) return null;
  let tF=0,tE=0,tS=0,tK=0,tT=0;
  apps.forEach(a=>{ const c=calcApp(a,settings); tF+=parseFloat(a.fattura)||0; tE+=c.extraTot; tS+=c.costoViaggio; tK+=c.km*2; tT+=c.tempoTotale; });
  const tU=tF+tE-tS;
  return (
    <div style={{border:"1px solid #78350f",background:"#0d0d0d",padding:14,borderRadius:2}}>
      <div style={{color:"#f59e0b",fontSize:11,letterSpacing:"0.12em",marginBottom:10}}>◈ RIEPILOGO GIORNATA</div>
      {[["Interventi",apps.length],["Km A/R totali",`${tK} km`],["Tempo totale",minToHHMM(tT)]].map(([k,v])=>(
        <div key={k} style={{display:"flex",justifyContent:"space-between",color:"#444",marginBottom:4,fontSize:13}}><span>{k}</span><span style={{color:"#777"}}>{v}</span></div>
      ))}
      <div style={{borderTop:"1px solid #1e1e1e",marginTop:8,paddingTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",color:"#444",marginBottom:4,fontSize:13}}><span>Fattura base</span><span style={{color:"#4ade80"}}>€{fmt(tF)}</span></div>
        {tE>0&&<div style={{display:"flex",justifyContent:"space-between",color:"#444",marginBottom:4,fontSize:13}}><span>Extra dispositivi</span><span style={{color:"#4ade80"}}>+€{tE.toFixed(2)}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",color:"#444",marginBottom:4,fontSize:13}}><span>Spese viaggio</span><span style={{color:"#f59e0b"}}>–€{tS.toFixed(2)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:"bold",marginTop:10,paddingTop:10,borderTop:"1px solid #2a2a2a"}}>
          <span style={{color:"#ccc"}}>UTILE LORDO</span>
          <span style={{color:tU>=0?"#4ade80":"#f87171"}}>€{tU.toFixed(2)}</span>
        </div>
      </div>
    </div>
  );
}
function App() {
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [apps,setApps]=useState([]);
  const [showS,setShowS]=useState(false);
  const [mapsReady,setMapsReady]=useState(window._mapsReady);
  const [data,setData]=useState(new Date().toISOString().split("T")[0]);
  useEffect(()=>{ window._mapsReadyPromise.then(()=>setMapsReady(true)); },[]);
  const fetchKm=useCallback((id,dest)=>{
    if(!window.google?.maps) return;
    setApps(p=>p.map(a=>a.id===id?{...a,kmLoading:true,kmError:null}:a));
    new window.google.maps.DistanceMatrixService().getDistanceMatrix(
      {origins:[settings.cittaBase],destinations:[dest],travelMode:"DRIVING",unitSystem:0},
      (res,st)=>{
        if(st==="OK"&&res.rows[0].elements[0].status==="OK"){
          const km=Math.round(res.rows[0].elements[0].distance.value/100)/10;
          setApps(p=>p.map(a=>a.id===id?{...a,km,kmLoading:false}:a));
        } else { setApps(p=>p.map(a=>a.id===id?{...a,kmLoading:false,kmError:true}:a)); }
      }
    );
  },[settings.cittaBase]);
  const addApp=()=>setApps(p=>{ const last=p[p.length-1],na=emptyApp(); if(last){const c=calcApp(last,settings);na.orarioInizio=minToTime(timeToMin(last.orarioInizio)+c.tempoTotale+15);} return [...p,na]; });
  const updateApp=(id,k,v)=>setApps(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));
  const removeApp=id=>setApps(p=>p.filter(a=>a.id!==id));
  const getEndMin=app=>{ const c=calcApp(app,settings); return timeToMin(app.orarioInizio)+c.tempoTotale; };
  return (
    <div style={{fontFamily:"'IBM Plex Mono','Courier New',monospace",background:"#080808",minHeight:"100vh",color:"#d6d3cf",padding:14,maxWidth:480,margin:"0 auto"}}>
      <div style={{marginBottom:14}}>
        <div style={{color:"#f59e0b",fontSize:10,letterSpacing:"0.2em",marginBottom:6}}>AGENDA INSTALLAZIONI ALLARMI</div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <input type="date" value={data} onChange={e=>setData(e.target.value)} style={{...iStyle,width:"auto",color:"#f59e0b"}}/>
          <button onClick={()=>setShowS(s=>!s)} style={{background:"transparent",border:`1px solid ${showS?"#92400e":"#2a2a2a"}`,color:showS?"#f59e0b":"#555",padding:"6px 10px",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>{showS?"✕ chiudi":"⚙ parametri"}</button>
          <span style={{fontSize:10,color:mapsReady?"#4ade80":"#444",marginLeft:"auto"}}>{mapsReady?"● Maps OK":"○ Maps…"}</span>
        </div>
      </div>
      {showS&&(
        <div style={{border:"1px solid #1e1e1e",background:"#0c0c0c",padding:10,marginBottom:12}}>
          <div style={{color:"#f59e0b",fontSize:10,letterSpacing:"0.1em",marginBottom:8}}>⚙ PARAMETRI</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div><label style={lbl}>€/KM</label><input type="number" step="0.01" style={iStyle} value={settings.costoKm} onChange={e=>setSettings(s=>({...s,costoKm:parseFloat(e.target.value)}))}/></div>
            <div><label style={lbl}>VELOCITÀ km/h</label><input type="number" style={iStyle} value={settings.velocitaMedia} onChange={e=>setSettings(s=>({...s,velocitaMedia:parseFloat(e.target.value)}))}/></div>
            <div style={{gridColumn:"1/-1"}}><label style={lbl}>PARTENZA</label><input style={iStyle} value={settings.cittaBase} onChange={e=>setSettings(s=>({...s,cittaBase:e.target.value}))}/></div>
          </div>
        </div>
      )}
      {apps.map((app,idx)=><AppCard key={app.id} app={app} idx={idx} settings={settings} onUpdate={updateApp} onRemove={removeApp} prevEndMin={idx>0?getEndMin(apps[idx-1]):null} fetchKm={fetchKm}/>)}
      <button onClick={addApp} style={{width:"100%",background:"transparent",border:"1px dashed #1e1e1e",color:"#333",padding:12,fontFamily:"inherit",fontSize:12,cursor:"pointer",letterSpacing:"0.12em",marginBottom:12}}
        onMouseOver={e=>{e.currentTarget.style.borderColor="#f59e0b";e.currentTarget.style.color="#f59e0b";}}
        onMouseOut={e=>{e.currentTarget.style.borderColor="#1e1e1e";e.currentTarget.style.color="#333";}}>
        + AGGIUNGI INTERVENTO
      </button>
      <DaySummary apps={apps} settings={settings}/>
      <div style={{color:"#1a1a1a",fontSize:10,textAlign:"center",marginTop:14}}>{settings.cittaBase} · €{settings.costoKm}/km</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
