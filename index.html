<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Installazioni</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCygUawe-ofhq2BtB-l0SvQnM3jlGmqCyo&libraries=places&callback=initMaps" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #12122a; color: #e8e8f0; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
input, select, button { font-family: inherit; }
.pac-container { background:#fff; border:1px solid #ccc; font-family:'IBM Plex Mono',monospace; box-shadow:0 2px 8px rgba(0,0,0,.1); }
.pac-item { color:#444; border-top:1px solid #eee; padding:7px 10px; cursor:pointer; font-size:12px; }
.pac-item:hover { background:#fff8f0; }
.pac-item-query,.pac-matched { color:#c2540a; }
table { border-collapse:collapse; width:100%; }
td,th { padding:7px 8px; text-align:left; border-bottom:1px solid #eee; font-size:11px; }
th { color:#888; font-weight:normal; letter-spacing:.08em; background:#fafafa; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// Maps init
window._mapsReady = false;
window.initMaps = function(){ window._mapsReady=true; if(window._mapsReadyResolve) window._mapsReadyResolve(); };
window._mapsReadyPromise = new Promise(function(r){ window._mapsReadyResolve=r; if(window._mapsReady) r(); });

// ── Shortcuts ──────────────────────────────────────────────────────────────
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useCallback = React.useCallback;

// ── Constants ──────────────────────────────────────────────────────────────
var OR = '#c2540a';
var STORAGE_KEY = 'agenda_registro_v2';
var ARCHIVE_KEY  = 'agenda_archivio_v2';
var DEFAULT_SETTINGS = { costoKm:0.35, velocitaMedia:60, cittaBase:'Genova, Italia' };

// ── Utils ──────────────────────────────────────────────────────────────────
function minToHHMM(m){ if(!m&&m!==0)return'—'; var hh=Math.floor(m/60),mm=m%60; return hh>0?(hh+'h'+(mm>0?' '+mm+'m':'')):(mm+'m'); }
function timeToMin(t){ var p=t.split(':').map(Number); return p[0]*60+p[1]; }
function minToTime(t){ var h=Math.floor(t/60)%24,m=t%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function fmt(n){ return (parseFloat(n)||0).toFixed(2); }
function fmtData(d){ if(!d)return''; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function meseAnnoStr(ym){ var p=ym.split('-'); var N=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']; return N[parseInt(p[1])-1]+' '+p[0]; }
function oggi(){ return new Date().toISOString().split('T')[0]; }
function meseCorrente(){ return oggi().slice(0,7); }
function loadD(k){ try{ return JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ return {}; } }
function saveD(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function emptyApp(){ return { id:Date.now()+Math.random(), cliente:'', indirizzo:'', km:null, kmLoading:false, kmError:null, durataLavoro:90, fattura:'', orarioInizio:'08:00', note:'', extraDisp:[] }; }
function calcApp(app,s){
  var km=parseFloat(app.km)||0, fat=parseFloat(app.fattura)||0;
  var ext=(app.extraDisp||[]).reduce(function(a,d){ return a+(parseFloat(d.prezzo)||0); },0);
  var tv=km>0?Math.round((km/s.velocitaMedia)*60):0;
  var cv=km*2*s.costoKm, dl=parseInt(app.durataLavoro)||0;
  return { km:km, fattura:fat, extraTot:ext, tempoViaggio:tv, costoViaggio:cv, durataLavoro:dl, tempoTotale:tv*2+dl, utile:fat+ext-cv };
}

// ── Styles ─────────────────────────────────────────────────────────────────
var IS = { width:'100%', background:'#fff', border:'1px solid #ddd', color:'#1a1a1a', padding:'8px 10px', fontSize:'14px', fontFamily:'inherit', outline:'none', boxSizing:'border-box', borderRadius:'3px' };
var LBL = { color:'#888', fontSize:'11px', display:'block', marginBottom:'4px', letterSpacing:'.07em' };

function Btn(props){
  var c=props.color||OR;
  var s=Object.assign({ background:'transparent', border:'1px solid '+c, color:c, padding:props.small?'4px 10px':'7px 14px', fontSize:props.small?10:11, fontFamily:'inherit', cursor:'pointer', letterSpacing:'.07em', borderRadius:'3px' }, props.style||{});
  return h('button',{ onClick:props.onClick, style:s }, props.children);
}
function Tab(props){
  return h('button',{ onClick:props.onClick, style:{ background:props.active?'#fff8f0':'transparent', border:'1px solid '+(props.active?OR:'#ddd'), color:props.active?OR:'#999', padding:'7px 14px', fontSize:'11px', fontFamily:'inherit', cursor:'pointer', borderRadius:'3px' } }, props.label);
}

// ── PDF ────────────────────────────────────────────────────────────────────
function pdfGiornaliero(data, righe, settings){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(194,84,10);
  doc.text('RESOCONTO GIORNALIERO',14,18);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(120);
  doc.text('Data: '+fmtData(data)+'  |  Partenza: '+settings.cittaBase,14,27);
  var body=righe.map(function(r){ return [r.cliente||'—','€'+fmt(r.fattura),r.extra>0?'+€'+fmt(r.extra):'—',r.spese>0?'-€'+fmt(r.spese):'—','€'+fmt(r.utile)]; });
  var tF=righe.reduce(function(s,r){ return s+r.fattura; },0);
  var tE=righe.reduce(function(s,r){ return s+r.extra; },0);
  var tS=righe.reduce(function(s,r){ return s+r.spese; },0);
  var tU=righe.reduce(function(s,r){ return s+r.utile; },0);
  doc.autoTable({ startY:33, head:[['Cliente','Fattura','Extra','Spese','Utile']], body:body, foot:[['TOTALE','€'+fmt(tF),tE>0?'+€'+fmt(tE):'—','-€'+fmt(tS),'€'+fmt(tU)]], headStyles:{fillColor:[194,84,10],textColor:255,fontSize:10}, footStyles:{fillColor:[245,245,240],textColor:[50,50,50],fontStyle:'bold'}, bodyStyles:{fontSize:10}, alternateRowStyles:{fillColor:[255,250,245]}, margin:{left:14,right:14} });
  doc.save('giornaliero_'+data+'.pdf');
}

function pdfMensile(mese, giorniMap, settings){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(194,84,10);
  doc.text('RESOCONTO MENSILE',14,18);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(120);
  doc.text('Periodo: '+meseAnnoStr(mese)+'  |  Partenza: '+settings.cittaBase,14,27);
  var body=[]; var tF=0,tE=0,tS=0,tU=0;
  var keys=Object.keys(giorniMap).sort();
  keys.forEach(function(d){
    var righe=giorniMap[d];
    righe.forEach(function(r,i){
      body.push([i===0?fmtData(d):'', r.cliente||'—', '€'+fmt(r.fattura), r.extra>0?'+€'+fmt(r.extra):'—', r.spese>0?'-€'+fmt(r.spese):'—', '€'+fmt(r.utile)]);
      tF+=r.fattura; tE+=r.extra; tS+=r.spese; tU+=r.utile;
    });
  });
  doc.autoTable({ startY:33, head:[['Data','Cliente','Fattura','Extra','Spese','Utile']], body:body, foot:[['TOTALE','','€'+fmt(tF),tE>0?'+€'+fmt(tE):'—','-€'+fmt(tS),'€'+fmt(tU)]], headStyles:{fillColor:[194,84,10],textColor:255,fontSize:9}, footStyles:{fillColor:[245,245,240],textColor:[50,50,50],fontStyle:'bold',fontSize:9}, bodyStyles:{fontSize:9}, alternateRowStyles:{fillColor:[255,250,245]}, margin:{left:14,right:14}, columnStyles:{0:{cellWidth:22},1:{cellWidth:48}} });
  doc.save('mensile_'+mese+'.pdf');
}

// ── AddressInput ───────────────────────────────────────────────────────────
function AddressInput(props){
  var ref=useRef(null), ac=useRef(null);
  var rr=useState(window._mapsReady); var rdy=rr[0]; var setRdy=rr[1];
  useEffect(function(){ window._mapsReadyPromise.then(function(){ setRdy(true); }); },[]);
  useEffect(function(){
    if(!rdy||!ref.current||ac.current) return;
    ac.current=new window.google.maps.places.Autocomplete(ref.current,{ componentRestrictions:{country:'it'}, fields:['formatted_address'] });
    ac.current.addListener('place_changed',function(){
      var p=ac.current.getPlace();
      if(p&&p.formatted_address){ props.onChange(p.formatted_address); props.onPlaceSelected(p.formatted_address); }
    });
  },[rdy]);
  return h('input',{ ref:ref, value:props.value, onChange:function(e){ props.onChange(e.target.value); }, placeholder:rdy?'Indirizzo — autocompletamento attivo':'Indirizzo', style:IS });
}

// ── Extra Dispositivi ──────────────────────────────────────────────────────
function Extra(props){
  var items=props.items, onChange=props.onChange;
  var tot=items.reduce(function(s,d){ return s+(parseFloat(d.prezzo)||0); },0);
  return h('div',{ style:{marginTop:10,borderTop:'1px solid #eee',paddingTop:10} },
    h('div',{ style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8} },
      h('span',{ style:Object.assign({},LBL,{margin:0}) },'EXTRA SUL POSTO'),
      h(Btn,{ small:true, onClick:function(){ onChange(items.concat([{id:Date.now(),nome:'',prezzo:''}])); } },'+ aggiungi')
    ),
    items.length===0 && h('div',{ style:{color:'#ccc',fontSize:11} },'Nessun extra'),
    items.map(function(d){
      return h('div',{ key:d.id, style:{display:'grid',gridTemplateColumns:'1fr 90px 30px',gap:'4px',marginBottom:'4px'} },
        h('input',{ style:IS, placeholder:'Dispositivo', value:d.nome, onChange:function(e){ onChange(items.map(function(x){ return x.id===d.id?Object.assign({},x,{nome:e.target.value}):x; })); } }),
        h('input',{ type:'number', style:Object.assign({},IS,{color:'#16a34a'}), placeholder:'€', value:d.prezzo, onChange:function(e){ onChange(items.map(function(x){ return x.id===d.id?Object.assign({},x,{prezzo:e.target.value}):x; })); } }),
        h('button',{ onClick:function(){ onChange(items.filter(function(x){ return x.id!==d.id; })); }, style:{background:'transparent',border:'1px solid #eee',color:'#bbb',cursor:'pointer',fontSize:'16px',borderRadius:'3px'} },'×')
      );
    }),
    items.length>0 && h('div',{ style:{textAlign:'right',color:'#16a34a',fontSize:12,marginTop:4} },'+€'+tot.toFixed(2))
  );
}

// ── AppCard ────────────────────────────────────────────────────────────────
function AppCard(props){
  var app=props.app, idx=props.idx, settings=props.settings;
  var c=calcApp(app,settings);
  var sm=timeToMin(app.orarioInizio), em=sm+c.tempoTotale;
  var ov=props.prevEndMin!==null&&sm<props.prevEndMin;
  var se=useState(false); var showEx=se[0]; var setShowEx=se[1];
  var upd=function(k,v){ props.onUpdate(app.id,k,v); };

  return h('div',{ style:{border:'1px solid #e5e5e5',background:'#fff',marginBottom:12,borderRadius:4,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    // Header
    h('div',{ style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'#fff8f0',borderBottom:'1px solid #f0e8e0',borderRadius:'4px 4px 0 0'} },
      h('span',{ style:{color:OR,fontSize:11,letterSpacing:'.12em',fontWeight:'bold'} },'INTERVENTO '+(idx+1)),
      h('button',{ onClick:function(){ props.onRemove(app.id); }, style:{background:'transparent',border:'none',color:'#ccc',cursor:'pointer',fontSize:12} },'✕ rimuovi')
    ),
    h('div',{ style:{padding:12} },
      // Cliente
      h('div',{ style:{marginBottom:8} }, h('label',{ style:LBL },'CLIENTE'), h('input',{ style:IS, placeholder:'Nome cliente', value:app.cliente, onChange:function(e){ upd('cliente',e.target.value); } })),
      // Indirizzo
      h('div',{ style:{marginBottom:8} }, h('label',{ style:LBL },'INDIRIZZO'), h(AddressInput,{ value:app.indirizzo, onChange:function(v){ upd('indirizzo',v); }, onPlaceSelected:function(a){ props.fetchKm(app.id,a); } })),
      // KM / Durata / Inizio
      h('div',{ style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8} },
        h('div',null,
          h('label',{ style:LBL },'KM ANDATA'),
          app.kmLoading ? h('div',{ style:Object.assign({},IS,{color:'#bbb',textAlign:'center'}) },'…')
            : h('input',{ type:'number', style:Object.assign({},IS,{color:app.km?OR:'#1a1a1a'}), placeholder:'0', value:app.km!=null?app.km:'', onChange:function(e){ upd('km',e.target.value); } }),
          app.kmError && h('div',{ style:{color:'#dc2626',fontSize:10,marginTop:2} },'errore — manuale')
        ),
        h('div',null,
          h('label',{ style:LBL },'DURATA'),
          h('select',{ style:IS, value:app.durataLavoro, onChange:function(e){ upd('durataLavoro',e.target.value); } },
            [30,60,90,120,150,180,240,300,360].map(function(v){ return h('option',{ key:v, value:v },minToHHMM(v)); })
          )
        ),
        h('div',null, h('label',{ style:LBL },'INIZIO'), h('input',{ type:'time', style:IS, value:app.orarioInizio, onChange:function(e){ upd('orarioInizio',e.target.value); } }))
      ),
      // Fattura
      h('div',{ style:{marginBottom:8} }, h('label',{ style:LBL },'FATTURA (€)'), h('input',{ type:'number', style:Object.assign({},IS,{color:'#16a34a'}), placeholder:'0.00', value:app.fattura, onChange:function(e){ upd('fattura',e.target.value); } })),
      // Extra toggle
      h('button',{ onClick:function(){ setShowEx(function(s){ return !s; }); }, style:{width:'100%',background:showEx?'#fff8f0':'transparent',border:'1px solid '+(showEx?OR:'#e5e5e5'),color:showEx?OR:'#bbb',padding:'6px 8px',fontSize:11,fontFamily:'inherit',cursor:'pointer',textAlign:'left',borderRadius:3} },
        showEx?'▲ chiudi extra':'▼ dispositivi extra sul posto'
      ),
      showEx && h(Extra,{ items:app.extraDisp||[], onChange:function(v){ upd('extraDisp',v); } }),
      // Note
      h('div',{ style:{marginTop:8} }, h('label',{ style:LBL },'NOTE'), h('input',{ style:IS, placeholder:'Note', value:app.note, onChange:function(e){ upd('note',e.target.value); } }))
    ),
    // Calcoli
    (app.km||app.fattura) && h('div',{ style:{margin:'0 12px 12px',border:'1px solid #f0e8e0',background:'#fffaf5',padding:10,fontSize:12,borderRadius:3} },
      h('div',{ style:{display:'grid',gridTemplateColumns:'1fr 1fr',rowGap:4,color:'#bbb'} },
        h('span',null,'Viaggio A/R'), h('span',{ style:{color:'#555'} },c.km*2+' km · '+minToHHMM(c.tempoViaggio*2)),
        h('span',null,'Trasferta'), h('span',{ style:{color:OR} },'–€'+c.costoViaggio.toFixed(2)),
        h('span',null,'Fattura'), h('span',{ style:{color:'#16a34a'} },'€'+fmt(app.fattura)),
        c.extraTot>0 && h('span',null,'Extra'), c.extraTot>0 && h('span',{ style:{color:'#16a34a'} },'+€'+c.extraTot.toFixed(2)),
        h('span',null,'Fine prevista'), h('span',{ style:{color:'#555'} },minToTime(em))
      ),
      app.fattura && h('div',{ style:{marginTop:6,paddingTop:6,borderTop:'1px solid #f0e8e0',display:'flex',justifyContent:'space-between'} },
        h('span',{ style:{color:'#bbb'} },'Utile lordo'),
        h('span',{ style:{fontWeight:'bold',color:c.utile>=0?'#16a34a':'#dc2626'} },'€'+c.utile.toFixed(2))
      )
    ),
    ov && h('div',{ style:{margin:'0 12px 12px',border:'1px solid #fca5a5',background:'#fee2e2',color:'#dc2626',fontSize:11,padding:'6px 8px',borderRadius:3} },'⚠ SOVRAPPOSIZIONE — precedente finisce '+minToTime(props.prevEndMin))
  );
}

// ── Riepilogo Giornata ─────────────────────────────────────────────────────
function RiepilogoGiornata(props){
  var apps=props.apps, settings=props.settings, data=props.data;
  if(!apps.length||!apps.some(function(a){ return a.fattura||a.km; })) return null;
  var tF=0,tE=0,tS=0,tK=0,tT=0;
  var righe=apps.map(function(a,i){
    var c=calcApp(a,settings);
    tF+=parseFloat(a.fattura)||0; tE+=c.extraTot; tS+=c.costoViaggio; tK+=c.km*2; tT+=c.tempoTotale;
    return { cliente:a.cliente, fattura:parseFloat(a.fattura)||0, extra:c.extraTot, spese:i===0?c.costoViaggio:0, utile:(parseFloat(a.fattura)||0)+c.extraTot-(i===0?c.costoViaggio:0) };
  });
  var tU=tF+tE-tS;
  return h('div',{ style:{border:'1px solid #f0e8e0',background:'#fff8f0',padding:14,borderRadius:4,boxShadow:'0 1px 4px rgba(194,84,10,.08)'} },
    h('div',{ style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:6} },
      h('div',{ style:{color:OR,fontSize:11,letterSpacing:'.12em',fontWeight:'bold'} },'◈ RIEPILOGO '+fmtData(data)),
      h(Btn,{ small:true, onClick:function(){ pdfGiornaliero(data,righe,settings); } },'↓ PDF giornaliero')
    ),
    [['Interventi',apps.length],['Km A/R',tK+' km'],['Tempo',minToHHMM(tT)]].map(function(kv){
      return h('div',{ key:kv[0], style:{display:'flex',justifyContent:'space-between',color:'#bbb',marginBottom:3,fontSize:12} }, h('span',null,kv[0]), h('span',{ style:{color:'#555'} },kv[1]));
    }),
    h('div',{ style:{borderTop:'1px solid #f0e8e0',marginTop:8,paddingTop:8} },
      h('div',{ style:{display:'flex',justifyContent:'space-between',color:'#bbb',marginBottom:3,fontSize:13} }, h('span',null,'Fattura'), h('span',{ style:{color:'#16a34a'} },'€'+fmt(tF))),
      tE>0 && h('div',{ style:{display:'flex',justifyContent:'space-between',color:'#bbb',marginBottom:3,fontSize:13} }, h('span',null,'Extra'), h('span',{ style:{color:'#16a34a'} },'+€'+tE.toFixed(2))),
      h('div',{ style:{display:'flex',justifyContent:'space-between',color:'#bbb',marginBottom:3,fontSize:13} }, h('span',null,'Spese viaggio'), h('span',{ style:{color:OR} },'–€'+tS.toFixed(2))),
      h('div',{ style:{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:'bold',marginTop:8,paddingTop:8,borderTop:'1px solid #f0e8e0'} },
        h('span',{ style:{color:'#333'} },'UTILE LORDO'),
        h('span',{ style:{color:tU>=0?'#16a34a':'#dc2626'} },'€'+tU.toFixed(2))
      )
    )
  );
}

// ── Registro Mese Corrente ─────────────────────────────────────────────────
function RegistroMese(props){
  var registro=props.registro, settings=props.settings;
  var mese=meseCorrente(), primo=mese+'-01', fine=oggi();
  var giorni=Object.entries(registro).filter(function(e){ return e[0]>=primo&&e[0]<=fine; }).sort(function(a,b){ return a[0].localeCompare(b[0]); });
  var righe=[]; var tF=0,tE=0,tS=0,tU=0,tInst=0;
  giorni.forEach(function(entry){
    var data=entry[0], g=entry[1];
    var cl=g.clienti||[], n=Math.max(cl.length,1);
    tInst+=g.interventi||n;
    if(cl.length===0){
      righe.push({ data:data, cliente:'—', fattura:g.fattura, extra:g.extra, spese:g.spese, utile:g.utile, isFirst:true });
      tF+=g.fattura; tE+=g.extra; tS+=g.spese; tU+=g.utile;
    } else {
      cl.forEach(function(c,i){
        var fat=(g.fattureClienti&&g.fattureClienti[i]!=null)?g.fattureClienti[i]:g.fattura/n;
        var ext=(g.extraClienti&&g.extraClienti[i]!=null)?g.extraClienti[i]:(i===0?g.extra:0);
        var spe=i===0?g.spese:0;
        var uti=fat+ext-spe;
        righe.push({ data:data, cliente:c, fattura:fat, extra:ext, spese:spe, utile:uti, isFirst:i===0 });
        tF+=fat; tE+=ext; if(i===0) tS+=g.spese; tU+=uti;
      });
    }
  });
  var giorniPdf={};
  giorni.forEach(function(entry){
    var d=entry[0], g=entry[1];
    var cl=g.clienti||[], n=Math.max(cl.length,1);
    if(cl.length===0){ giorniPdf[d]=[{ cliente:'—', fattura:g.fattura, extra:g.extra, spese:g.spese, utile:g.utile }]; }
    else { giorniPdf[d]=cl.map(function(c,i){ var fat=(g.fattureClienti&&g.fattureClienti[i]!=null)?g.fattureClienti[i]:g.fattura/n; return { cliente:c, fattura:fat, extra:i===0?g.extra:0, spese:i===0?g.spese:0, utile:fat+(i===0?g.extra:0)-(i===0?g.spese:0) }; }); }
  });
  if(giorni.length===0) return h('div',{ style:{background:'#fff',border:'1px solid #e5e5e5',borderRadius:4,padding:16,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    h('div',{ style:{color:OR,fontSize:11,fontWeight:'bold',letterSpacing:'.1em',marginBottom:8} },'◈ '+meseAnnoStr(mese).toUpperCase()),
    h('div',{ style:{color:'#bbb',fontSize:12} },'Nessun dato inserito questo mese.')
  );
  return h('div',{ style:{background:'#fff',border:'1px solid #e5e5e5',borderRadius:4,padding:14,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    h('div',{ style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:6} },
      h('div',{ style:{color:OR,fontSize:11,fontWeight:'bold',letterSpacing:'.1em'} },'◈ '+meseAnnoStr(mese).toUpperCase()),
      h('div',{ style:{display:'flex',gap:6,flexWrap:'wrap'} },
        h(Btn,{ small:true, onClick:function(){ pdfMensile(mese,giorniPdf,settings); } },'↓ PDF mensile'),
        h(Btn,{ small:true, color:'#7c3aed', onClick:function(){ props.onArchivia(mese,giorni,{tF:tF,tE:tE,tS:tS,tU:tU,tInst:tInst},giorniPdf); } },'Archivia mese ▸')
      )
    ),
    h('div',{ style:{overflowX:'auto'} },
      h('table',null,
        h('thead',null, h('tr',null, h('th',null,'Data'), h('th',null,'Cliente'), h('th',{ style:{textAlign:'right'} },'Fattura'), h('th',{ style:{textAlign:'right'} },'Extra'), h('th',{ style:{textAlign:'right'} },'Spese'), h('th',{ style:{textAlign:'right'} },'Utile'))),
        h('tbody',null, righe.map(function(r,i){
          return h('tr',{ key:i, style:{background:r.isFirst&&i>0?'#fffaf5':'#fff'} },
            h('td',{ style:{color:'#888',whiteSpace:'nowrap',fontWeight:r.isFirst?'bold':'normal'} },r.isFirst?fmtData(r.data):''),
            h('td',{ style:{color:'#333'} },r.cliente),
            h('td',{ style:{color:'#16a34a',textAlign:'right',whiteSpace:'nowrap'} },'€'+fmt(r.fattura)),
            h('td',{ style:{color:r.extra>0?'#16a34a':'#ddd',textAlign:'right',whiteSpace:'nowrap'} },r.extra>0?'+€'+fmt(r.extra):'—'),
            h('td',{ style:{color:r.spese>0?OR:'#ddd',textAlign:'right',whiteSpace:'nowrap'} },r.spese>0?'–€'+fmt(r.spese):'—'),
            h('td',{ style:{textAlign:'right',whiteSpace:'nowrap',fontWeight:'bold',color:r.utile>=0?'#16a34a':'#dc2626'} },'€'+fmt(r.utile))
          );
        })),
        h('tfoot',null, h('tr',{ style:{borderTop:'2px solid #eee'} },
          h('td',{ colSpan:2, style:{color:'#555',paddingTop:10,fontWeight:'bold',fontSize:11} },'TOTALE AD OGGI'),
          h('td',{ style:{color:'#16a34a',textAlign:'right',fontWeight:'bold',paddingTop:10} },'€'+fmt(tF)),
          h('td',{ style:{color:'#16a34a',textAlign:'right',fontWeight:'bold',paddingTop:10} },tE>0?'+€'+fmt(tE):'—'),
          h('td',{ style:{color:OR,textAlign:'right',fontWeight:'bold',paddingTop:10} },'–€'+fmt(tS)),
          h('td',{ style:{color:tU>=0?'#16a34a':'#dc2626',textAlign:'right',fontSize:14,fontWeight:'bold',paddingTop:10} },'€'+fmt(tU))
        ))
      )
    )
  );
}

// ── Archivio ───────────────────────────────────────────────────────────────
function Archivio(props){
  var archivio=props.archivio, settings=props.settings;
  var er=useState({}); var exp=er[0]; var setExp=er[1];
  var mesi=Object.keys(archivio).sort().reverse();
  if(mesi.length===0) return h('div',{ style:{background:'#fff',border:'1px solid #e5e5e5',borderRadius:4,padding:16,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    h('div',{ style:{color:'#7c3aed',fontSize:11,fontWeight:'bold',letterSpacing:'.1em',marginBottom:8} },'▦ ARCHIVIO STORICO'),
    h('div',{ style:{color:'#bbb',fontSize:12} },'Nessun mese archiviato.')
  );
  return h('div',{ style:{background:'#fff',border:'1px solid #e5e5e5',borderRadius:4,padding:14,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    h('div',{ style:{color:'#7c3aed',fontSize:11,fontWeight:'bold',letterSpacing:'.1em',marginBottom:12} },'▦ ARCHIVIO STORICO'),
    mesi.map(function(m){
      var a=archivio[m], open=exp[m];
      return h('div',{ key:m, style:{border:'1px solid #ede9f8',borderRadius:4,marginBottom:8,overflow:'hidden'} },
        h('div',{ onClick:function(){ setExp(function(p){ var n=Object.assign({},p); n[m]=!p[m]; return n; }); }, style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'#faf5ff',cursor:'pointer'} },
          h('div',null,
            h('div',{ style:{color:'#7c3aed',fontWeight:'bold',fontSize:12} },meseAnnoStr(m)),
            h('div',{ style:{color:'#999',fontSize:10,marginTop:2} },a.tInst+' installazioni · Utile €'+fmt(a.tU)+' · Spese €'+fmt(a.tS))
          ),
          h('span',{ style:{color:'#7c3aed'} },open?'▲':'▼')
        ),
        open && a.giorni && h('div',{ style:{padding:'10px 12px'} },
          h('div',{ style:{display:'flex',justifyContent:'flex-end',marginBottom:8} },
            h(Btn,{ small:true, color:'#7c3aed', onClick:function(){ pdfMensile(m,a.giorni,settings); } },'↓ PDF')
          ),
          h('div',{ style:{overflowX:'auto'} },
            h('table',null,
              h('thead',null, h('tr',null, h('th',null,'Data'), h('th',null,'Cliente'), h('th',{ style:{textAlign:'right'} },'Fattura'), h('th',{ style:{textAlign:'right'} },'Extra'), h('th',{ style:{textAlign:'right'} },'Spese'), h('th',{ style:{textAlign:'right'} },'Utile'))),
              h('tbody',null,
                Object.keys(a.giorni).sort().reduce(function(acc,d){
                  return acc.concat(a.giorni[d].map(function(r,i){
                    return h('tr',{ key:d+'-'+i },
                      h('td',{ style:{color:'#888',whiteSpace:'nowrap',fontWeight:i===0?'bold':'normal'} },i===0?fmtData(d):''),
                      h('td',{ style:{color:'#333'} },r.cliente),
                      h('td',{ style:{color:'#16a34a',textAlign:'right'} },'€'+fmt(r.fattura)),
                      h('td',{ style:{color:r.extra>0?'#16a34a':'#ddd',textAlign:'right'} },r.extra>0?'+€'+fmt(r.extra):'—'),
                      h('td',{ style:{color:r.spese>0?OR:'#ddd',textAlign:'right'} },r.spese>0?'–€'+fmt(r.spese):'—'),
                      h('td',{ style:{textAlign:'right',fontWeight:'bold',color:r.utile>=0?'#16a34a':'#dc2626'} },'€'+fmt(r.utile))
                    );
                  }));
                },[])
              ),
              h('tfoot',null, h('tr',{ style:{borderTop:'2px solid #ede9f8'} },
                h('td',{ colSpan:2, style:{fontWeight:'bold',color:'#555',paddingTop:8} },'TOTALE'),
                h('td',{ style:{color:'#16a34a',textAlign:'right',fontWeight:'bold',paddingTop:8} },'€'+fmt(a.tF)),
                h('td',{ style:{color:'#16a34a',textAlign:'right',fontWeight:'bold',paddingTop:8} },a.tE>0?'+€'+fmt(a.tE):'—'),
                h('td',{ style:{color:OR,textAlign:'right',fontWeight:'bold',paddingTop:8} },'–€'+fmt(a.tS)),
                h('td',{ style:{color:a.tU>=0?'#16a34a':'#dc2626',textAlign:'right',fontWeight:'bold',fontSize:13,paddingTop:8} },'€'+fmt(a.tU))
              ))
            )
          )
        )
      );
    })
  );
}

// ── Parametri ──────────────────────────────────────────────────────────────
function Parametri(props){
  var s=props.settings, set=props.setSettings, fileRef=props.fileRef, bkMsg=props.bkMsg, onEsporta=props.onEsporta, onImporta=props.onImporta;
  return h('div',{ style:{border:'1px solid #e5e5e5',background:'#fff',padding:12,marginBottom:12,borderRadius:4,boxShadow:'0 1px 4px rgba(0,0,0,.06)'} },
    h('div',{ style:{color:OR,fontSize:10,fontWeight:'bold',letterSpacing:'.1em',marginBottom:10} },'⚙ PARAMETRI'),
    h('div',{ style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10} },
      h('div',null, h('label',{ style:LBL },'€/KM'), h('input',{ type:'number', step:'0.01', style:IS, value:s.costoKm, onChange:function(e){ set(function(x){ return Object.assign({},x,{costoKm:parseFloat(e.target.value)}); }); } })),
      h('div',null, h('label',{ style:LBL },'VELOCITÀ km/h'), h('input',{ type:'number', style:IS, value:s.velocitaMedia, onChange:function(e){ set(function(x){ return Object.assign({},x,{velocitaMedia:parseFloat(e.target.value)}); }); } })),
      h('div',{ style:{gridColumn:'1/-1'} }, h('label',{ style:LBL },'PARTENZA'), h('input',{ style:IS, value:s.cittaBase, onChange:function(e){ set(function(x){ return Object.assign({},x,{cittaBase:e.target.value}); }); } }))
    ),
    h('div',{ style:{borderTop:'1px solid #eee',paddingTop:10,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'} },
      h(Btn,{ small:true, color:'#16a34a', onClick:onEsporta },'↓ esporta backup'),
      h(Btn,{ small:true, color:'#555', onClick:function(){ fileRef.current.click(); } },'↑ importa backup'),
      h('input',{ ref:fileRef, type:'file', accept:'.json', onChange:onImporta, style:{display:'none'} }),
      bkMsg && h('span',{ style:{fontSize:11,color:bkMsg[0]==='✓'?'#16a34a':'#dc2626'} },bkMsg)
    )
  );
}

// ── App principale ─────────────────────────────────────────────────────────
function App(){
  var sr=useState(DEFAULT_SETTINGS); var settings=sr[0]; var setSettings=sr[1];
  var ar=useState([]); var apps=ar[0]; var setApps=ar[1];
  var vr=useState('agenda'); var vista=vr[0]; var setVista=vr[1];
  var ss=useState(false); var showS=ss[0]; var setShowS=ss[1];
  var mr=useState(window._mapsReady); var mapsReady=mr[0]; var setMapsReady=mr[1];
  var dr=useState(oggi()); var data=dr[0]; var setData=dr[1];
  var rr=useState(function(){ return loadD(STORAGE_KEY); }); var registro=rr[0]; var setRegistro=rr[1];
  var arch=useState(function(){ return loadD(ARCHIVE_KEY); }); var archivio=arch[0]; var setArchivio=arch[1];
  var fileRef=useRef(null);
  var bkr=useState(null); var bkMsg=bkr[0]; var setBkMsg=bkr[1];

  useEffect(function(){ window._mapsReadyPromise.then(function(){ setMapsReady(true); }); },[]);

  // Salva automaticamente nel registro
  useEffect(function(){
    if(!apps.length||!apps.some(function(a){ return a.fattura||a.km; })) return;
    var tF=0,tE=0,tS=0; var clienti=[],fattureClienti=[],extraClienti=[];
    apps.forEach(function(a){ var c=calcApp(a,settings); tF+=parseFloat(a.fattura)||0; tE+=c.extraTot; tS+=c.costoViaggio; clienti.push(a.cliente||''); fattureClienti.push(parseFloat(a.fattura)||0); extraClienti.push(c.extraTot); });
    var rec={ clienti:clienti, fattureClienti:fattureClienti, extraClienti:extraClienti, fattura:tF, extra:tE, spese:tS, utile:tF+tE-tS, interventi:apps.length };
    setRegistro(function(prev){ var n=Object.assign({},prev); n[data]=rec; saveD(STORAGE_KEY,n); return n; });
  },[apps,data,settings]);

  var fetchKm=useCallback(function(id,dest){
    if(!window.google||!window.google.maps) return;
    setApps(function(p){ return p.map(function(a){ return a.id===id?Object.assign({},a,{kmLoading:true,kmError:null}):a; }); });
    new window.google.maps.DistanceMatrixService().getDistanceMatrix(
      { origins:[settings.cittaBase], destinations:[dest], travelMode:'DRIVING', unitSystem:0 },
      function(res,st){
        if(st==='OK'&&res.rows[0].elements[0].status==='OK'){
          var km=Math.round(res.rows[0].elements[0].distance.value/100)/10;
          setApps(function(p){ return p.map(function(a){ return a.id===id?Object.assign({},a,{km:km,kmLoading:false}):a; }); });
        } else {
          setApps(function(p){ return p.map(function(a){ return a.id===id?Object.assign({},a,{kmLoading:false,kmError:true}):a; }); });
        }
      }
    );
  },[settings.cittaBase]);

  function addApp(){
    setApps(function(p){
      var last=p[p.length-1], na=emptyApp();
      if(last){ var c=calcApp(last,settings); na.orarioInizio=minToTime(timeToMin(last.orarioInizio)+c.tempoTotale+15); }
      return p.concat([na]);
    });
  }
  function updateApp(id,k,v){ setApps(function(p){ return p.map(function(a){ return a.id===id?Object.assign({},a,{},(function(o){ o[k]=v; return o; })({})):a; }); }); }
  function removeApp(id){ setApps(function(p){ return p.filter(function(a){ return a.id!==id; }); }); }
  function getEndMin(app){ var c=calcApp(app,settings); return timeToMin(app.orarioInizio)+c.tempoTotale; }

  function archivaMese(mese,giorni,totals,giorniPdf){
    var voce={ tInst:totals.tInst, tF:totals.tF, tE:totals.tE, tS:totals.tS, tU:totals.tU, giorni:giorniPdf };
    setArchivio(function(prev){ var n=Object.assign({},prev); n[mese]=voce; saveD(ARCHIVE_KEY,n); return n; });
    setRegistro(function(prev){ var n=Object.assign({},prev); Object.keys(n).filter(function(d){ return d.startsWith(mese); }).forEach(function(d){ delete n[d]; }); saveD(STORAGE_KEY,n); return n; });
    setVista('archivio');
  }

  function esporta(){ var b=new Blob([JSON.stringify({registro:registro,archivio:archivio},null,2)],{type:'application/json'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download='agenda_backup_'+oggi()+'.json'; a.click(); URL.revokeObjectURL(u); }
  function importa(e){ var f=e.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(ev){ try{ var d=JSON.parse(ev.target.result); if(d.registro){ setRegistro(function(prev){ var n=Object.assign({},prev,d.registro); saveD(STORAGE_KEY,n); return n; }); } if(d.archivio){ setArchivio(function(prev){ var n=Object.assign({},prev,d.archivio); saveD(ARCHIVE_KEY,n); return n; }); } setBkMsg('✓ Importato'); }catch(err){ setBkMsg('✗ File non valido'); } setTimeout(function(){ setBkMsg(null); },3000); }; r.readAsText(f); e.target.value=''; }

  // Fix updateApp con spread corretto
  function updApp(id,k,v){ setApps(function(p){ return p.map(function(a){ if(a.id!==id)return a; var n={}; Object.keys(a).forEach(function(key){ n[key]=a[key]; }); n[k]=v; return n; }); }); }

  return h('div',{ style:{fontFamily:"'IBM Plex Mono','Courier New',monospace",background:'#f5f5f0',minHeight:'100vh',padding:14,maxWidth:480,margin:'0 auto'} },
    // Header
    h('div',{ style:{marginBottom:14} },
      h('div',{ style:{color:OR,fontSize:10,letterSpacing:'.2em',marginBottom:8,fontWeight:'bold'} },'AGENDA INSTALLAZIONI ALLARMI'),
      h('div',{ style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'} },
        h(Tab,{ label:'Agenda', active:vista==='agenda', onClick:function(){ setVista('agenda'); setShowS(false); } }),
        h(Tab,{ label:'Registro', active:vista==='registro', onClick:function(){ setVista('registro'); setShowS(false); } }),
        h(Tab,{ label:'Archivio', active:vista==='archivio', onClick:function(){ setVista('archivio'); setShowS(false); } }),
        h('button',{ onClick:function(){ setShowS(function(s){ return !s; }); }, style:{background:showS?'#fff8f0':'transparent',border:'1px solid '+(showS?OR:'#ddd'),color:showS?OR:'#999',padding:'7px 12px',fontSize:11,fontFamily:'inherit',cursor:'pointer',borderRadius:3} },'⚙'),
        h('span',{ style:{fontSize:10,color:mapsReady?'#16a34a':'#bbb',marginLeft:'auto'} },mapsReady?'● Maps':'○…')
      )
    ),
    showS && h(Parametri,{ settings:settings, setSettings:setSettings, fileRef:fileRef, bkMsg:bkMsg, onEsporta:esporta, onImporta:importa }),

    // Vista Agenda
    vista==='agenda' && h('div',null,
      h('div',{ style:{marginBottom:10} },
        h('label',{ style:LBL },'DATA INTERVENTO'),
        h('input',{ type:'date', value:data, onChange:function(e){ setData(e.target.value); }, style:Object.assign({},IS,{color:OR,width:'auto'}) })
      ),
      apps.map(function(app,idx){
        return h(AppCard,{ key:app.id, app:app, idx:idx, settings:settings, onUpdate:updApp, onRemove:removeApp, prevEndMin:idx>0?getEndMin(apps[idx-1]):null, fetchKm:fetchKm });
      }),
      h('button',{
        onClick:addApp,
        style:{width:'100%',background:'#fff',border:'1px dashed #ddd',color:'#bbb',padding:12,fontFamily:'inherit',fontSize:12,cursor:'pointer',letterSpacing:'.12em',marginBottom:12,borderRadius:4},
        onMouseOver:function(e){ e.currentTarget.style.borderColor=OR; e.currentTarget.style.color=OR; },
        onMouseOut:function(e){ e.currentTarget.style.borderColor='#ddd'; e.currentTarget.style.color='#bbb'; }
      },'+ AGGIUNGI INTERVENTO'),
      h(RiepilogoGiornata,{ apps:apps, settings:settings, data:data })
    ),

    vista==='registro' && h(RegistroMese,{ registro:registro, settings:settings, onArchivia:archivaMese }),
    vista==='archivio' && h(Archivio,{ archivio:archivio, settings:settings }),

    h('div',{ style:{color:'#ccc',fontSize:10,textAlign:'center',marginTop:16} },settings.cittaBase+' · €'+settings.costoKm+'/km')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
