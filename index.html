<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Installazioni</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCygUawe-ofhq2BtB-l0SvQnM3jlGmqCyo&libraries=places&language=it"></script>
<style>
  :root {
    --bg: #12122a;
    --card: #1e1e3a;
    --card2: #252545;
    --accent: #2dd4bf;
    --accent-dim: rgba(45,212,191,0.15);
    --accent-border: rgba(45,212,191,0.35);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --danger: #f87171;
    --success: #4ade80;
    --warn: #fbbf24;
    --border: rgba(255,255,255,0.07);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  #root { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 20px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.3px;
  }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border-radius: var(--radius); padding: 4px; }
  .tab {
    flex: 1; padding: 9px 8px; border: none; background: transparent;
    color: var(--text-dim); border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .15s;
  }
  .tab.active { background: var(--accent); color: #0f172a; font-weight: 700; }
  .tab:hover:not(.active) { background: var(--card2); color: var(--text); }

  /* CARDS */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--accent);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }

  /* FORM */
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .form-group label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 8px 10px; font-size: 13px; font-family: inherit;
    transition: border-color .15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }
  input::placeholder { color: var(--text-muted); }
  select option { background: var(--card); }

  /* BUTTONS */
  .btn {
    padding: 8px 14px; border-radius: var(--radius-sm); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .15s; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-primary:hover { background: #22c5b0; }
  .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* DATE NAV */
  .date-nav {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .date-nav input[type=date] { flex: 1; }
  .date-label {
    font-size: 16px; font-weight: 700; color: var(--text); flex: 1; text-align: center;
  }

  /* INTERVENTION CARD */
  .interv-card {
    background: var(--card2); border-radius: var(--radius-sm);
    border: 1px solid var(--border); padding: 14px; margin-bottom: 10px;
    position: relative;
  }
  .interv-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .interv-num {
    background: var(--accent); color: #0f172a;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; flex-shrink: 0;
  }
  .interv-addr { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; margin: 0 10px; }
  .interv-type { font-size: 11px; color: var(--accent); font-weight: 600; }

  /* RIEPILOGO */
  .riepilogo {
    background: var(--card2); border-radius: var(--radius-sm);
    border: 1px solid var(--accent-border); padding: 14px; margin-top: 12px;
  }
  .riepilogo-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .riepilogo-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .riepilogo-row:last-child { border-bottom: none; }
  .riepilogo-row.total {
    font-weight: 700; font-size: 15px; color: var(--accent);
    margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--accent-border);
    border-bottom: none;
  }
  .riepilogo-label { color: var(--text-dim); }
  .riepilogo-value { color: var(--text); font-weight: 600; }
  .km-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-dim); color: var(--accent);
    border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 700;
  }

  /* REGISTRO MENSILE */
  .month-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .month-table th {
    text-align: left; padding: 8px 10px;
    color: var(--text-muted); font-weight: 600; font-size: 11px;
    border-bottom: 1px solid var(--border); text-transform: uppercase;
  }
  .month-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .month-table tr:hover td { background: var(--card2); }
  .month-table .total-row td { font-weight: 700; color: var(--accent); background: var(--accent-dim); }

  /* ARCHIVIO */
  .archive-month {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-bottom: 8px; overflow: hidden;
  }
  .archive-month-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; cursor: pointer;
    background: var(--card2);
    transition: background .15s;
  }
  .archive-month-header:hover { background: #2a2a50; }
  .archive-month-title { font-weight: 600; font-size: 14px; }
  .archive-month-summary { font-size: 12px; color: var(--text-dim); }
  .archive-month-body { padding: 12px 14px; }

  /* IMPOSTAZIONI */
  .settings-section { margin-bottom: 20px; }
  .settings-section h3 { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }

  /* ALERT / BADGE */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700;
  }
  .badge-green { background: rgba(74,222,128,0.15); color: var(--success); }
  .badge-yellow { background: rgba(251,191,36,0.15); color: var(--warn); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--danger); }

  /* LOADING */
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* UTILS */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .text-dim { color: var(--text-dim); }
  .text-muted { color: var(--text-muted); }
  .text-accent { color: var(--accent); }
  .text-danger { color: var(--danger); }
  .text-right { text-align: right; }
  .w-full { width: 100%; }

  @media (max-width: 600px) {
    .form-group { min-width: 100%; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .tabs { overflow-x: auto; }
  }

  /* Google Places Autocomplete dropdown */
  .pac-container {
    background: #1e1e3a !important;
    border: 1px solid rgba(45,212,191,0.35) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    margin-top: 4px !important;
  }
  .pac-item {
    background: #1e1e3a !important;
    color: #e2e8f0 !important;
    border-top: 1px solid rgba(255,255,255,0.06) !important;
    padding: 8px 12px !important;
    cursor: pointer !important;
    font-size: 13px !important;
  }
  .pac-item:hover, .pac-item-selected {
    background: #252545 !important;
  }
  .pac-item-query {
    color: #2dd4bf !important;
    font-size: 13px !important;
  }
  .pac-icon { display: none !important; }
  .pac-logo::after { display: none !important; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef } = React;

// ─── COSTANTI ───────────────────────────────────────────────────────────────
const GMAPS_KEY = 'AIzaSyCygUawe-ofhq2BtB-l0SvQnM3jlGmqCyo';
const STORAGE_KEY = 'agenda_installazioni_v3';

const TIPI_INTERVENTO = ['Nuova installazione','Manutenzione','Sostituzione CU','Upgrade','Altro'];
const MESI_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                 'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

const DEFAULT_SETTINGS = {
  costoKm: 0.27,
  cittaBase: 'Sori, Italia',
  tariffa_oraria: 0,
  pedaggi_km_rate: 0.09,
};

// ─── UTILS ──────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}
function fmtEur(n) {
  return '€ ' + (parseFloat(n) || 0).toFixed(2).replace('.', ',');
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function fmtMonthYear(dateStr) {
  if (!dateStr) return '';
  const [y, m] = dateStr.split('-');
  return `${MESI_IT[parseInt(m)-1]} ${y}`;
}
function newIntervento() {
  return {
    id: Date.now() + Math.random(),
    indirizzo: '',
    tipo: 'Nuova installazione',
    cliente: '',
    note: '',
    dispositivi_extra: 0,
    ricavo: 0,
    spese_extra: 0,
  };
}

// ─── PERSISTENZA ─────────────────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { giorni: {}, settings: DEFAULT_SETTINGS };
    const parsed = JSON.parse(raw);
    return {
      giorni: parsed.giorni || {},
      settings: { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) },
    };
  } catch { return { giorni: {}, settings: DEFAULT_SETTINGS }; }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

// ─── DISTANCE MATRIX ─────────────────────────────────────────────────────────
// Calcola km totali percorso: casa → i1 → i2 → … → casa
// Usa DistanceMatrixService JS (no CORS, funziona da browser)
function calcolaPercorso(cittaBase, indirizzi) {
  return new Promise((resolve) => {
    const validi = indirizzi.filter(a => a && a.trim());
    if (validi.length === 0) { resolve({ km: 0 }); return; }

    if (!window.google || !window.google.maps) { resolve({ km: 0 }); return; }

    const tappe = [cittaBase, ...validi, cittaBase];
    const service = new window.google.maps.DistanceMatrixService();
    let totalKm = 0;
    let idx = 0;

    function prossimoSegmento() {
      if (idx >= tappe.length - 1) {
        resolve({ km: Math.round(totalKm * 10) / 10 });
        return;
      }
      service.getDistanceMatrix(
        {
          origins: [tappe[idx]],
          destinations: [tappe[idx + 1]],
          travelMode: window.google.maps.TravelMode.DRIVING,
          unitSystem: window.google.maps.UnitSystem.METRIC,
        },
        (response, status) => {
          if (status === 'OK') {
            const el = response.rows?.[0]?.elements?.[0];
            if (el?.status === 'OK') {
              totalKm += el.distance.value / 1000;
            }
          }
          idx++;
          prossimoSegmento();
        }
      );
    }

    prossimoSegmento();
  });
}

// ─── COMPONENTE PRINCIPALE ───────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => loadData());
  const [tab, setTab] = useState('oggi');
  const [dataSelezionata, setDataSelezionata] = useState(today());
  const [archivioOpen, setArchivioOpen] = useState({});
  const [calcoloInCorso, setCalcoloInCorso] = useState(false);
  const [exportMsg, setExportMsg] = useState('');
  const [mapsOk, setMapsOk] = useState(false);

  useEffect(() => {
    const check = () => {
      if (window.google && window.google.maps && window.google.maps.places) {
        setMapsOk(true); return true;
      }
      return false;
    };
    if (!check()) {
      const iv = setInterval(() => { if (check()) clearInterval(iv); }, 500);
      const to = setTimeout(() => clearInterval(iv), 10000);
      return () => { clearInterval(iv); clearTimeout(to); };
    }
  }, []);

  const { giorni, settings } = data;

  function updateSettings(patch) {
    setData(prev => {
      const next = { ...prev, settings: { ...prev.settings, ...patch } };
      saveData(next);
      return next;
    });
  }

  function getGiorno(dateStr) {
    return giorni[dateStr] || { interventi: [], km: 0, kmHighway: 0, note_giorno: '' };
  }

  function updateGiorno(dateStr, patch) {
    setData(prev => {
      const old = prev.giorni[dateStr] || { interventi: [], km: 0, kmHighway: 0, note_giorno: '' };
      const next = {
        ...prev,
        giorni: {
          ...prev.giorni,
          [dateStr]: { ...old, ...patch },
        },
      };
      saveData(next);
      return next;
    });
  }

  function addIntervento() {
    const g = getGiorno(dataSelezionata);
    updateGiorno(dataSelezionata, { interventi: [...g.interventi, newIntervento()] });
  }

  function updateIntervento(idx, patch) {
    const g = getGiorno(dataSelezionata);
    const list = g.interventi.map((it, i) => i === idx ? { ...it, ...patch } : it);
    updateGiorno(dataSelezionata, { interventi: list });
  }

  function removeIntervento(idx) {
    const g = getGiorno(dataSelezionata);
    const list = g.interventi.filter((_, i) => i !== idx);
    updateGiorno(dataSelezionata, { interventi: list });
  }

  async function calcolaKm() {
    const g = getGiorno(dataSelezionata);
    const indirizzi = g.interventi.map(i => i.indirizzo).filter(Boolean);
    if (!indirizzi.length) return;
    setCalcoloInCorso(true);
    try {
      const { km } = await calcolaPercorso(settings.cittaBase, indirizzi);
      updateGiorno(dataSelezionata, { km });
    } catch {}
    setCalcoloInCorso(false);
  }

  // ─── CALCOLO RIEPILOGO GIORNALIERO ───────────────────────────────────────
  function calcolaRiepilogo(dateStr) {
    const g = getGiorno(dateStr);
    const km = parseFloat(g.km) || 0;
    const kmHighway = parseFloat(g.kmHighway) || 0;
    const speseViaggio = km * settings.costoKm;
    const spesePedaggi = kmHighway * settings.pedaggi_km_rate;
    const speseExtra = g.interventi.reduce((s, i) => s + (parseFloat(i.spese_extra) || 0), 0);
    const ricavi = g.interventi.reduce((s, i) => s + (parseFloat(i.ricavo) || 0), 0);
    const totaleSpese = speseViaggio + spesePedaggi + speseExtra;
    return { km, kmHighway, speseViaggio, spesePedaggi, speseExtra, ricavi, totaleSpese };
  }

  // ─── CALCOLO REGISTRO MENSILE ─────────────────────────────────────────────
  function calcolaRegistroMese(annoMese) {
    // annoMese = 'YYYY-MM'
    const righe = [];
    Object.keys(giorni)
      .filter(d => d.startsWith(annoMese))
      .sort()
      .forEach(d => {
        const g = giorni[d];
        if (!g.interventi?.length && !g.km) return;
        const r = calcolaRiepilogo(d);
        righe.push({ data: d, ...r, interventi: g.interventi.length });
      });
    const totali = righe.reduce((acc, r) => ({
      km: acc.km + r.km,
      speseViaggio: acc.speseViaggio + r.speseViaggio,
      spesePedaggi: acc.spesePedaggi + r.spesePedaggi,
      speseExtra: acc.speseExtra + r.speseExtra,
      totaleSpese: acc.totaleSpese + r.totaleSpese,
      ricavi: acc.ricavi + r.ricavi,
    }), { km: 0, speseViaggio: 0, spesePedaggi: 0, speseExtra: 0, totaleSpese: 0, ricavi: 0 });
    return { righe, totali };
  }

  // ─── ARCHIVIO MESI ───────────────────────────────────────────────────────
  function getMesiDisponibili() {
    const mesi = new Set();
    Object.keys(giorni).forEach(d => {
      const m = d.slice(0, 7);
      const g = giorni[d];
      if (g.interventi?.length || g.km) mesi.add(m);
    });
    return Array.from(mesi).sort().reverse();
  }

  // ─── BACKUP ──────────────────────────────────────────────────────────────
  function esportaBackup() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `agenda_backup_${today()}.json`;
    a.click();
  }

  function importaBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const next = {
          giorni: parsed.giorni || {},
          settings: { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) },
        };
        saveData(next);
        setData(next);
        setExportMsg('✓ Backup importato');
        setTimeout(() => setExportMsg(''), 3000);
      } catch { setExportMsg('⚠ Errore importazione'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  const giorno = getGiorno(dataSelezionata);
  const riepilogo = calcolaRiepilogo(dataSelezionata);
  const meseCorrente = dataSelezionata.slice(0, 7);
  const mesiDisponibili = getMesiDisponibili();

  return React.createElement('div', null,
    // HEADER
    React.createElement('div', { className: 'header' },
      React.createElement('div', null,
        React.createElement('h1', null, '⚡ Agenda Installazioni'),
        React.createElement('div', { className: 'header-sub' },
          'Protecta Group · Ajax Systems  ',
          React.createElement('span', {
            style: {
              fontSize: 11, fontWeight: 700, marginLeft: 6,
              color: mapsOk ? 'var(--success)' : 'var(--text-muted)',
            }
          }, mapsOk ? '● MAPS OK' : '○ Maps…'),
        ),
      ),
      React.createElement('div', { className: 'header-actions' },
        React.createElement('button', { className: 'btn btn-secondary btn-sm', onClick: esportaBackup }, '⬇ Backup'),
        React.createElement('label', { className: 'btn btn-secondary btn-sm', style: { cursor: 'pointer' } },
          '⬆ Importa',
          React.createElement('input', { type: 'file', accept: '.json', style: { display: 'none' }, onChange: importaBackup })
        ),
        exportMsg && React.createElement('span', { style: { fontSize: 12, color: 'var(--accent)', alignSelf: 'center' } }, exportMsg),
      ),
    ),

    // TABS
    React.createElement('div', { className: 'tabs' },
      ['oggi', 'mese', 'archivio', 'impostazioni'].map(t =>
        React.createElement('button', {
          key: t, className: `tab ${tab === t ? 'active' : ''}`,
          onClick: () => setTab(t),
        }, t === 'oggi' ? '📋 Giorno' : t === 'mese' ? '📅 Mese' : t === 'archivio' ? '🗂 Archivio' : '⚙ Impost.')
      )
    ),

    // ── TAB GIORNO ──────────────────────────────────────────────────────────
    tab === 'oggi' && React.createElement('div', null,
      // Navigazione data
      React.createElement('div', { className: 'date-nav' },
        React.createElement('button', {
          className: 'btn btn-secondary btn-sm',
          onClick: () => {
            const d = new Date(dataSelezionata);
            d.setDate(d.getDate() - 1);
            setDataSelezionata(d.toISOString().slice(0, 10));
          }
        }, '◀'),
        React.createElement('input', {
          type: 'date', value: dataSelezionata,
          onChange: e => setDataSelezionata(e.target.value),
          style: { textAlign: 'center', maxWidth: 160 }
        }),
        React.createElement('button', {
          className: 'btn btn-secondary btn-sm',
          onClick: () => {
            const d = new Date(dataSelezionata);
            d.setDate(d.getDate() + 1);
            setDataSelezionata(d.toISOString().slice(0, 10));
          }
        }, '▶'),
        React.createElement('button', {
          className: 'btn btn-secondary btn-sm',

      React.createElement('span', { className: 'riepilogo-value' },
        React.createElement('span', { className: 'km-badge' }, `${km.toFixed(1)} km`)

    ),
    React.createElement('div', { className: 'riepilogo-row' },

          React.createElement('th', null, 'KM'),
          React.createElement('th', null, 'Sp. viaggio'),

            React.createElement('td', null, fmtEur(r.speseViaggio)),

}

// ─── ADDRESS INPUT CON AUTOCOMPLETE ─────────────────────────────────────────
function AddressInput({ value, onChange, placeholder }) {
  const inputRef = useRef(null);
  const autocompleteRef = useRef(null);

  useEffect(() => {
    if (!window.google || !window.google.maps || !window.google.maps.places) return;
    if (autocompleteRef.current) return; // già inizializzato

    autocompleteRef.current = new window.google.maps.places.Autocomplete(inputRef.current, {
      types: ['address'],
      componentRestrictions: { country: 'it' },
      fields: ['formatted_address'],
    });

    autocompleteRef.current.addListener('place_changed', () => {
      const place = autocompleteRef.current.getPlace();
      if (place && place.formatted_address) {
        onChange(place.formatted_address);
      }
    });
  }, []);

  // Sincronizza valore esterno → input (es. reset)
  useEffect(() => {
    if (inputRef.current && inputRef.current !== document.activeElement) {
      inputRef.current.value = value || '';
    }
  }, [value]);

  return React.createElement('input', {
    ref: inputRef,
    type: 'text',
    defaultValue: value || '',
    placeholder: placeholder || 'Via Roma 1, Genova GE',
    onBlur: e => {
      // Se l'utente ha scritto senza selezionare suggerimento, salva comunque
      if (e.target.value !== value) onChange(e.target.value);
    },
    style: { width: '100%' },
  });
}
