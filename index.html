<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Installazioni</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCygUawe-ofhq2BtB-l0SvQnM3jlGmqCyo&libraries=places&language=it"></script>
<style>
  :root {
    --bg:#12122a; --card:#1e1e3a; --card2:#252545;
    --accent:#2dd4bf; --accent-dim:rgba(45,212,191,0.15); --accent-border:rgba(45,212,191,0.35);
    --text:#e2e8f0; --text-dim:#94a3b8; --text-muted:#64748b;
    --danger:#f87171; --success:#4ade80; --warn:#fbbf24;
    --border:rgba(255,255,255,0.07); --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  #root{max-width:960px;margin:0 auto;padding:16px;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .header h1{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border-radius:var(--radius);padding:4px;}
  .tab{flex:1;padding:9px 8px;border:none;background:transparent;color:var(--text-dim);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
  .tab.active{background:var(--accent);color:#0f172a;font-weight:700;}
  .tab:hover:not(.active){background:var(--card2);color:var(--text);}
  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
  .card-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
  .form-group label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
  input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;transition:border-color .15s;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  input::placeholder{color:var(--text-muted);}
  select option{background:var(--card);}
  .btn{padding:8px 14px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#0f172a;}
  .btn-primary:hover{background:#22c5b0;}
  .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,0.3);}
  .btn-danger:hover{background:rgba(248,113,113,0.1);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .date-nav input[type=date]{flex:1;}
  .interv-card{background:var(--card2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px;margin-bottom:10px;}
  .interv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .interv-num{background:var(--accent);color:#0f172a;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .interv-addr{font-size:13px;font-weight:600;color:var(--text);flex:1;margin:0 10px;}
  .interv-type{font-size:11px;color:var(--accent);font-weight:600;}
  /* REPORT */
  .report-box{background:var(--card2);border-radius:var(--radius-sm);border:1px solid var(--accent-border);padding:16px;margin-top:14px;}
  .report-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;display:flex;justify-content:space-between;align-items:center;}
  .rtable{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
  .rtable th{text-align:left;padding:6px 8px;color:var(--text-muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--border);text-transform:uppercase;}
  .rtable td{padding:7px 8px;border-bottom:1px solid var(--border);}
  .rtable tr:last-child td{border-bottom:none;}
  .rtable .tot-row td{font-weight:700;background:var(--accent-dim);color:var(--accent);border-top:1px solid var(--accent-border);}
  .summary-bar{display:flex;gap:20px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border);}
  .summary-item{display:flex;flex-direction:column;gap:2px;}
  .summary-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;}
  .summary-value{font-size:15px;font-weight:700;}
  .km-badge{display:inline-flex;align-items:center;background:var(--accent-dim);color:var(--accent);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;}
  /* MESE */
  .mtable{width:100%;border-collapse:collapse;font-size:12px;}
  .mtable th{text-align:left;padding:7px 8px;color:var(--text-muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--border);text-transform:uppercase;}
  .mtable td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .mtable tr.day-sep td{border-top:1px solid rgba(255,255,255,0.08);}
  .mtable .tot-row td{font-weight:700;color:var(--accent);background:var(--accent-dim);border-top:1px solid var(--accent-border);}
  /* ARCHIVIO */
  .arch-item{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
  .arch-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:var(--card2);transition:background .15s;}
  .arch-header:hover{background:#2a2a50;}
  .arch-body{padding:12px 14px;}
  .settings-section{margin-bottom:20px;}
  .settings-section h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;}
  .spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .flex{display:flex;}.gap-8{gap:8px;}.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.w-full{width:100%;}
  @media(max-width:600px){.form-group{min-width:100%;}.header{flex-direction:column;align-items:flex-start;gap:10px;}.tabs{overflow-x:auto;}}
  .pac-container{background:#1e1e3a!important;border:1px solid rgba(45,212,191,0.35)!important;border-radius:8px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;font-family:inherit!important;margin-top:4px!important;}
  .pac-item{background:#1e1e3a!important;color:#e2e8f0!important;border-top:1px solid rgba(255,255,255,0.06)!important;padding:8px 12px!important;cursor:pointer!important;font-size:13px!important;}
  .pac-item:hover,.pac-item-selected{background:#252545!important;}
  .pac-item-query{color:#2dd4bf!important;font-size:13px!important;}
  .pac-icon{display:none!important;}.pac-logo::after{display:none!important;}
  @media print{
    @page{margin:8mm 10mm;size:A4 portrait;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    html,body{background:#fff!important;color:#000!important;height:auto!important;overflow:visible!important;}
    #root{padding:0;max-width:100%;height:auto!important;}
    .no-print{display:none!important;}
    /* Tabelle compatte */
    .rtable,.mtable{font-size:8.5px!important;width:100%!important;}
    .rtable th,.mtable th{padding:3px 4px!important;color:#444!important;border-bottom:1px solid #bbb!important;font-size:8px!important;}
    .rtable td,.mtable td{padding:3px 4px!important;border-bottom:1px solid #e8e8e8!important;color:#000!important;}
    .rtable .tot-row td,.mtable .tot-row td{background:#f0f0f0!important;color:#000!important;border-top:1px solid #bbb!important;padding:3px 4px!important;}
    .mtable tr.day-sep td{border-top:1px solid #ccc!important;}
    /* Report box */
    .report-box{background:#fff!important;border:1px solid #ccc!important;padding:6px!important;margin:0!important;}
    .report-title{font-size:10px!important;margin-bottom:6px!important;}
    /* Summary bar compatta: una riga */
    .summary-bar{display:flex!important;flex-wrap:nowrap!important;gap:12px!important;padding-top:5px!important;border-top:1px solid #ccc!important;}
    .summary-label{font-size:7.5px!important;}
    .summary-value{font-size:11px!important;color:#000!important;}
    .km-badge{background:#eee!important;color:#000!important;font-size:9px!important;padding:1px 5px!important;}
    /* Card mese */
    .card{background:#fff!important;border:none!important;padding:0!important;margin:0!important;}
    .card-title{font-size:10px!important;margin-bottom:4px!important;}
    /* Elimina spazio vuoto residuo */
    div,section{page-break-inside:avoid;}
    body>div:last-child{page-break-after:avoid!important;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef}=React;
const STORAGE_KEY='agenda_installazioni_v3';
const TIPI=['Nuova installazione','Manutenzione','Sostituzione CU','Upgrade','Altro'];
const MESI_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DEF_SET={costoKm:0.27,cittaBase:'Sori, Italia',pedaggi_km_rate:0.09};

function today(){return new Date().toISOString().slice(0,10);}
function fmtEur(n){return '€ '+(parseFloat(n)||0).toFixed(2).replace('.',',');}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
function fmtMY(s){if(!s)return'';const[y,m]=s.split('-');return`${MESI_IT[parseInt(m)-1]} ${y}`;}
function newInt(){return{id:Date.now()+Math.random(),indirizzo:'',casello:'',tipo:'Nuova installazione',cliente:'',note:'',dispositivi_extra:0,ricavo:120,spese_extra:0};}

function loadData(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(!r)return{giorni:{},settings:DEF_SET};const p=JSON.parse(r);return{giorni:p.giorni||{},settings:{...DEF_SET,...(p.settings||{})}};}
  catch{return{giorni:{},settings:DEF_SET};}
}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

// Restituisce { km, segmenti[], kmHighway, segmentiHighway[] }
// caselli[i] = casello di entrata per l'intervento i ('' = nessuna autostrada)
// Se casello compilato → quel segmento (e ritorno se ultimo) è autostradale → kmSegH = kmSeg
function calcolaPercorso(base,indirizzi,caselli){
  return new Promise(resolve=>{
    const v=indirizzi.filter(a=>a&&a.trim());
    if(!v.length||!window.google?.maps){resolve({km:0,segmenti:[],kmHighway:0,segmentiHighway:[]});return;}
    const t=[base,...v,base];
    const svc=new window.google.maps.DistanceMatrixService();
    const segmenti=[],segmentiHighway=[];
    let tot=0,totH=0,i=0;
    // caselli.length === indirizzi.length; caselli[i] riferito al segmento i (base→v[0], v[0]→v[1], ...)
    // segmento i = t[i]→t[i+1]; segmento n = t[n]→base (ritorno)
    const n=v.length;
    function nxt(){
      if(i>=t.length-1){
        resolve({km:Math.round(tot*10)/10,segmenti,kmHighway:Math.round(totH*10)/10,segmentiHighway});
        return;
      }
      svc.getDistanceMatrix({origins:[t[i]],destinations:[t[i+1]],travelMode:window.google.maps.TravelMode.DRIVING,unitSystem:window.google.maps.UnitSystem.METRIC},(res,st)=>{
        let km=0;
        if(st==='OK'){const el=res.rows?.[0]?.elements?.[0];if(el?.status==='OK')km=el.distance.value/1000;}
        const kmR=Math.round(km*10)/10;
        segmenti.push(kmR);
        tot+=km;
        // Segmento i è autostradale se: casello[i] compilato (segmento andata)
        // oppure se è il segmento di ritorno (i===n) e l'ultimo intervento ha casello compilato
        const isHwy = i<n ? !!(caselli&&caselli[i]&&caselli[i].trim())
                           : !!(caselli&&caselli[n-1]&&caselli[n-1].trim());
        const hwy=isHwy?kmR:0;
        segmentiHighway.push(hwy);
        totH+=hwy;
        i++;nxt();
      });
    }
    nxt();
  });
}

function calcGiorno(g,s){
  const km=parseFloat(g.km)||0,kmH=parseFloat(g.kmHighway)||0;
  const sv=km*s.costoKm,sp=kmH*s.pedaggi_km_rate;
  const se=(g.interventi||[]).reduce((a,i)=>a+(parseFloat(i.spese_extra)||0),0);
  const ric=(g.interventi||[]).reduce((a,i)=>a+(parseFloat(i.ricavo)||0),0);
  return{km,kmH,sv,sp,se,ric,tot:sv+sp+se};
}

// Spese viaggio E pedaggi proporzionali al segmento di competenza
// seg[i] = tratto verso cliente i; seg[n] = ritorno casa; segH = km autostradali per segmento
function righeGiorno(g,s){
  const r=calcGiorno(g,s);
  const interventi=g.interventi||[];
  const seg=g.segmenti||[];
  const segH=g.segmentiHighway||[];
  const n=interventi.length;

  return interventi.map((it,i)=>{
    let kmSeg=0,kmSegH=0;
    if(seg.length===n+1){
      kmSeg=seg[i];
      if(i===n-1)kmSeg+=seg[n];
      if(segH.length===n+1){
        kmSegH=segH[i];
        if(i===n-1)kmSegH+=segH[n];
      }
    } else {
      kmSeg=n===1?r.km:(i===0?r.km:0);
      kmSegH=n===1?r.kmH:(i===0?r.kmH:0);
    }
    const sv=kmSeg*s.costoKm;
    const sp=kmSegH*s.pedaggi_km_rate;
    const se=parseFloat(it.spese_extra)||0;
    const ric=parseFloat(it.ricavo)||0;
    const totS=sv+sp+se;
    return{prima:i===0,cliente:it.cliente||'—',tipo:it.tipo,indirizzo:it.indirizzo||'—',ric,sv,sp,se,totS,netto:ric-totS,km:kmSeg,kmH:kmSegH};
  });
}

function App(){
  const [data,setData]=useState(()=>loadData());
  const [tab,setTab]=useState('oggi');
  const [dataSel,setDataSel]=useState(today());
  const [archOpen,setArchOpen]=useState({});
  const [calcInfo,setCalcInfo]=useState('');
  const [msg,setMsg]=useState('');
  const [mapsOk,setMapsOk]=useState(false);

  useEffect(()=>{
    const chk=()=>{if(window.google?.maps?.places){setMapsOk(true);return true;}return false;};
    if(!chk()){const iv=setInterval(()=>{if(chk())clearInterval(iv);},500);const to=setTimeout(()=>clearInterval(iv),10000);return()=>{clearInterval(iv);clearTimeout(to);};}
  },[]);

  const{giorni,settings}=data;
  function upSet(p){setData(prev=>{const n={...prev,settings:{...prev.settings,...p}};saveData(n);return n;});}
  function getG(d){return giorni[d]||{interventi:[],km:0,kmHighway:0,note_giorno:''};}
  function upG(d,p){setData(prev=>{const o=prev.giorni[d]||{interventi:[],km:0,kmHighway:0,note_giorno:''};const n={...prev,giorni:{...prev.giorni,[d]:{...o,...p}}};saveData(n);return n;});}
  function addI(){const g=getG(dataSel);upG(dataSel,{interventi:[...g.interventi,newInt()]});}
  function upI(idx,p){const g=getG(dataSel);upG(dataSel,{interventi:g.interventi.map((it,i)=>i===idx?{...it,...p}:it)});}
  function delI(idx){const g=getG(dataSel);upG(dataSel,{interventi:g.interventi.filter((_,i)=>i!==idx)});}

  async function doCalc(lista){
    const ind=lista.map(i=>i.indirizzo);
    const cas=lista.map(i=>i.casello||'');
    const validi=ind.filter(Boolean);
    if(!validi.length||!window.google?.maps)return;
    setCalcInfo('calc');
    const{km,segmenti,kmHighway,segmentiHighway}=await calcolaPercorso(settings.cittaBase,validi,cas.filter((_,i)=>ind[i]));
    upG(dataSel,{km,segmenti,kmHighway,segmentiHighway});
    setCalcInfo('ok');
    setTimeout(()=>setCalcInfo(''),2500);
  }

  function onIndirizzoScelto(idx,nuovoInd){
    const g=getG(dataSel);
    const ag=g.interventi.map((it,i)=>i===idx?{...it,indirizzo:nuovoInd}:it);
    upG(dataSel,{interventi:ag});
    doCalc(ag);
  }

  // Registro mese: righe per cliente, dal 1° del mese ad oggi (se mese corrente)
  function registroMese(annoMese){
    const oggiStr=today();
    const isCurr=annoMese===oggiStr.slice(0,7);
    const righe=[];
    Object.keys(giorni).filter(d=>{
      if(!d.startsWith(annoMese))return false;
      if(isCurr&&d>oggiStr)return false;
      return true;
    }).sort().forEach(d=>{
      const g=giorni[d];
      if(!g.interventi?.length)return;
      righeGiorno(g,settings).forEach((r,i)=>righe.push({data:d,firstDay:i===0,...r}));
    });
    const tot=righe.reduce((a,r)=>({
      km:a.km+r.km,ric:a.ric+r.ric,sv:a.sv+r.sv,sp:a.sp+r.sp,se:a.se+r.se,totS:a.totS+r.totS,netto:a.netto+r.netto
    }),{km:0,ric:0,sv:0,sp:0,se:0,totS:0,netto:0});
    return{righe,tot};
  }

  function getMesi(){const s=new Set();Object.keys(giorni).forEach(d=>{const g=giorni[d];if(g.interventi?.length||g.km)s.add(d.slice(0,7));});return[...s].sort().reverse();}

  function backup(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`agenda_backup_${today()}.json`;a.click();}
  function importa(e){
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);const n={giorni:p.giorni||{},settings:{...DEF_SET,...(p.settings||{})}};saveData(n);setData(n);setMsg('✓ Importato');setTimeout(()=>setMsg(''),3000);}catch{setMsg('⚠ Errore');}};
    r.readAsText(f);e.target.value='';
  }

  function stampa(id){
    const el=document.getElementById(id);if(!el)return;
    const orig=document.body.innerHTML;
    const stile=`<style>
      @page{margin:8mm 10mm;size:A4 portrait;}
      *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      html,body{margin:0;padding:6px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:9px;color:#000;background:#fff;}
      table{width:100%;border-collapse:collapse;}
      th{text-align:left;padding:3px 4px;color:#444;border-bottom:1px solid #bbb;font-size:8px;text-transform:uppercase;font-weight:600;}
      td{padding:3px 4px;border-bottom:1px solid #eee;color:#000;vertical-align:middle;}
      .tot-row td{background:#f0f0f0!important;font-weight:700;border-top:1px solid #bbb;}
      .day-sep td{border-top:1px solid #ccc;}
      .report-title{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;}
      .summary-bar{display:flex;gap:14px;padding-top:5px;border-top:1px solid #ccc;margin-top:4px;flex-wrap:nowrap;}
      .summary-item{display:flex;flex-direction:column;gap:1px;}
      .summary-label{font-size:7px;text-transform:uppercase;color:#666;}
      .summary-value{font-size:11px;font-weight:700;color:#000!important;}
      .km-badge{background:#eee;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;color:#000!important;}
      .card-title{font-size:11px;font-weight:700;margin-bottom:6px;}
      button,.no-print{display:none!important;}
    </style>`;
    document.body.innerHTML=stile+el.innerHTML;
    window.print();
    document.body.innerHTML=orig;
    window.location.reload();
  }

  const giorno=getG(dataSel);
  const riepilogoG=calcGiorno(giorno,settings);
  const righeG=righeGiorno(giorno,settings);
  const meseSel=dataSel.slice(0,7);
  const regM=registroMese(meseSel);
  const mesi=getMesi();

  return React.createElement('div',null,

    // HEADER
    React.createElement('div',{className:'header'},
      React.createElement('div',null,
        React.createElement('h1',null,'⚡ Agenda Installazioni'),
        React.createElement('div',{className:'header-sub'},
          'Protecta Group · Ajax Systems  ',
          React.createElement('span',{style:{fontSize:11,fontWeight:700,marginLeft:6,color:mapsOk?'var(--success)':'var(--text-muted)'}},mapsOk?'● MAPS OK':'○ Maps…')
        )
      ),
      React.createElement('div',{className:'header-actions'},
        React.createElement('button',{className:'btn btn-secondary btn-sm no-print',onClick:backup},'⬇ Backup'),
        React.createElement('label',{className:'btn btn-secondary btn-sm no-print',style:{cursor:'pointer'}},

// ─── CASELLO INPUT ───────────────────────────────────────────────────────────
function CaselloInput({value,onChange}){
  const ref=useRef(null);const acRef=useRef(null);
  useEffect(()=>{
    if(!window.google?.maps?.places||acRef.current)return;
    acRef.current=new window.google.maps.places.Autocomplete(ref.current,{
      types:['establishment'],
      componentRestrictions:{country:'it'},
      fields:['name','formatted_address'],
    });
    // Bias verso caselli autostradali con keyword
    if(window.google.maps.places.SearchBox) {} // noop
    acRef.current.addListener('place_changed',()=>{
      const p=acRef.current.getPlace();
      if(p){
        // Usa name se disponibile (es. "Genova Ovest"), altrimenti formatted_address
        const v=p.name||p.formatted_address||'';
        onChange(v);
        if(ref.current)ref.current.value=v;
      }
    });
  },[]);
  useEffect(()=>{if(ref.current&&ref.current!==document.activeElement)ref.current.value=value||'';},[value]);
  return React.createElement('input',{
    ref,type:'text',defaultValue:value||'',
    placeholder:'Es. Genova Ovest, Savona...',
    onBlur:e=>{if(e.target.value!==value)onChange(e.target.value);},
    style:{width:'100%'},
  });
}

// ─── ADDRESS INPUT ────────────────────────────────────────────────────────────
function AddrInput({value,onChange,onPlaceSelected}){
  const ref=useRef(null);const acRef=useRef(null);
  useEffect(()=>{
    if(!window.google?.maps?.places||acRef.current)return;
    acRef.current=new window.google.maps.places.Autocomplete(ref.current,{types:['address'],componentRestrictions:{country:'it'},fields:['formatted_address']});
    acRef.current.addListener('place_changed',()=>{const p=acRef.current.getPlace();if(p?.formatted_address){onChange(p.formatted_address);if(onPlaceSelected)onPlaceSelected(p.formatted_address);}});
  },[]);
  useEffect(()=>{if(ref.current&&ref.current!==document.activeElement)ref.current.value=value||'';},[value]);
  return React.createElement('input',{ref,type:'text',defaultValue:value||'',placeholder:'Via Roma 1, Genova GE',className:'addr-input',onBlur:e=>{if(e.target.value!==value)onChange(e.target.value);},style:{width:'100%'}});
}
